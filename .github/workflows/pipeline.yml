name: Docker Mastery — Build, Scan & Push

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/docker-mastery
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: read
  packages: write
  security-events: write

jobs:

  # ── STAGE 1: Lint Dockerfile ────────────────────────────────────────────
  lint:
    name: Lint Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint basic Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfiles/basic/Dockerfile
          ignore: DL3008,DL3009

      - name: Lint multi-stage Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfiles/multi-stage/Dockerfile
          ignore: DL3008,DL3009

      - name: Lint hardened Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfiles/hardened/Dockerfile

  # ── STAGE 2: Build all images ────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build basic image
        run: |
          docker build \
            -t docker-mastery-basic:$IMAGE_TAG \
            -f dockerfiles/basic/Dockerfile .

      - name: Build multi-stage image
        run: |
          docker build \
            -t docker-mastery-multistage:$IMAGE_TAG \
            -f dockerfiles/multi-stage/Dockerfile .

      - name: Build hardened image
        run: |
          docker build \
            -t docker-mastery-hardened:$IMAGE_TAG \
            -f dockerfiles/hardened/Dockerfile .

      - name: Compare image sizes
        run: |
          echo "=== Image Size Comparison ==="
          docker images | grep docker-mastery

      - name: Save hardened image
        run: docker save docker-mastery-hardened:$IMAGE_TAG -o hardened.tar

      - uses: actions/upload-artifact@v4
        with:
          name: hardened-image
          path: hardened.tar

  # ── STAGE 3: Trivy security scan ─────────────────────────────────────────
  trivy:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: hardened-image

      - name: Load image
        run: docker load -i hardened.tar

      - name: Trivy scan — show findings
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker-mastery-hardened:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Trivy scan — fail on fixable CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker-mastery-hardened:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── STAGE 4: Push to GHCR (main only) ────────────────────────────────────
  push:
    name: Push to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: trivy
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: hardened-image

      - name: Load image
        run: docker load -i hardened.tar

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          docker tag docker-mastery-hardened:$IMAGE_TAG \
            ghcr.io/${{ github.repository_owner }}/docker-mastery:$IMAGE_TAG
          docker tag docker-mastery-hardened:$IMAGE_TAG \
            ghcr.io/${{ github.repository_owner }}/docker-mastery:latest
          docker push ghcr.io/${{ github.repository_owner }}/docker-mastery:$IMAGE_TAG
          docker push ghcr.io/${{ github.repository_owner }}/docker-mastery:latest
          echo "Pushed: ghcr.io/${{ github.repository_owner }}/docker-mastery:$IMAGE_TAG"
