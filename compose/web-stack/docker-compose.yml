# ============================================================
# compose/web-stack/docker-compose.yml
# MODULE 4 — Docker Compose multi-container stack
# Purpose: Flask + PostgreSQL + Redis + Nginx
# Run:     docker compose up -d
# Stop:    docker compose down
# Logs:    docker compose logs -f
# ============================================================

version: "3.9"

# ── Secrets — never put passwords in env vars directly ────────
secrets:
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt

# ── Named volumes — data persists across container restarts ───
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

# ── Networks — isolate tiers from each other ──────────────────
networks:
  # Frontend — only nginx and app live here
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  # Backend — app and databases — NO internet access
  backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.1.0/24

  # DB — database only — completely isolated
  db:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.2.0/24

services:

  # ── Nginx — reverse proxy ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - frontend
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

  # ── Flask app ─────────────────────────────────────────────
  app:
    build:
      context: ../../
      dockerfile: dockerfiles/hardened/Dockerfile
    container_name: flask-app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_VERSION: "1.0.0"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: appdb
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    secrets:
      - db_password
      - redis_password
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp/app
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis cache ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    command: >
      sh -c "redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128M
